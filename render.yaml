
databases:
  - name: INFX_490_DB
    plan: free
    databaseName: infx_490_db_gjyt
    user: infx_490_db_gjyt_user

services:
  - type: web
    plan: free
    name: mysite
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: INFX_490_DB
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2
        